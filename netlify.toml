[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Same-origin proxy for browser Supabase traffic (admin CRUD / auth refresh).
# Next.js also implements /api/supabase/*; this rewrite is a Netlify fallback
# so production does not depend on the browser reaching *.supabase.co directly.
[[redirects]]
  from = "/api/supabase/*"
  to = "https://mezdzqmygafpzkpolevt.supabase.co/:splat"
  status = 200
  force = false
